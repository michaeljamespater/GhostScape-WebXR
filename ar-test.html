<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Scape - Glasgow Cross 3D Anchor</title>
  
  <!-- Import the CesiumJS library for 3D Geospatial rendering -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
    #cesiumContainer { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  
  <div id="cesiumContainer"></div>

  <script>
    // 1. Initialize the 3D World
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: new Cesium.createWorldTerrain(),
      baseLayerPicker: false,
      geocoder: false,
      animation: false,
      timeline: false
    });

    // 2. PASTE YOUR GOOGLE API KEY HERE
    const GOOGLE_API_KEY = 'YOUR_API_KEY_HERE';

    try {
      // 3. Load the Google Map Tiles API (Photorealistic 3D Streetscape Geometry)
      const tileset = viewer.scene.primitives.add(
        new Cesium.Cesium3DTileset({
          url: `https://tile.googleapis.com/v1/3dtiles/root.json?key=AIzaSyCLu_6-mnwa_f0K0PL8p_0RekvAA-uBAZw`,
          showCreditsOnScreen: true,
        })
      );

      // 4. Your Exact Glasgow Cross Coordinates
      const glasgowLat = 55.85683908;
      const glasgowLng = -4.24441591;
      const glasgowAlt = 11.86973858;

      // 5. Create the "Ghost Scape" Spatial Anchor Placeholder
      // We are using a semi-transparent red box to represent where your Victorian AI overlay will sit
      const ghostAnchor = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(glasgowLng, glasgowLat, glasgowAlt),
        box: {
          dimensions: new Cesium.Cartesian3(15.0, 15.0, 15.0), // 15x15x15 meters
          material: Cesium.Color.RED.withAlpha(0.5),
          outline: true,
          outlineColor: Cesium.Color.BLACK
        },
        name: 'Victorian AI Overlay Anchor'
      });

      // 6. Automatically fly the camera down into the streets of Glasgow Cross
      viewer.flyTo(ghostAnchor, {
        offset: new Cesium.HeadingPitchRange(
          Cesium.Math.toRadians(0),   // Facing North
          Cesium.Math.toRadians(-20), // Looking slightly down
          80                          // Distance from the anchor in meters
        )
      });

    } catch (error) {
      console.error("Error loading 3D Map Tiles: ", error);
    }
  </script>
</body>
</html>
