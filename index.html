<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Scape POC - Glasgow Cross</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1e1e1e;
            color: #ffffff;
            margin-top: 50px;
        }

        h1 { margin-bottom: 5px; }
        p { color: #aaaaaa; margin-bottom: 20px; }

        /* Container to perfectly stack the images */
        .viewer-container {
            position: relative;
            width: 800px;  /* You can adjust this size */
            height: 500px; 
            border: 3px solid #333;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            background-color: #000;
        }

        /* Shared style for both image layers */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures images fill the container without squishing */
        }

        /* The UI Slider Container */
        .controls {
            width: 800px;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Styling the range slider */
        input[type="range"] {
            width: 60%;
            cursor: pointer;
        }

        .label {
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Ghost Scape: Glasgow Cross</h1>
    <p>19th-Century Victorian Historical Overlay</p>

   <!-- The Image Viewer -->
    <div class="viewer-container">
        <!-- Base Layer: Live Mapillary Viewer (Bottom) -->
        <iframe src="https://www.mapillary.com/embed?image_key=891011114964259&style=photo" frameborder="0" class="layer" id="baseLayer"></iframe>
        
        <!-- Ghost Layer: The AI Generated Concept (Top) -->
        <img src="glasgow_victorian.jpg" alt="Victorian Glasgow Cross" class="layer" id="ghostLayer" style="opacity: 0.5;">
    </div>
        
        <!-- Ghost Layer: The AI Generated Concept (Top) -->
        <img src="glasgow_victorian.jpg" alt="Victorian Glasgow Cross" class="layer" id="ghostLayer" style="opacity: 0.5;">
    </div>

    <!-- The Fader Controls -->
    <div class="controls">
        <span class="label">2026 (Modern)</span>
        <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.5">
        <span class="label">1850s (Victorian)</span>
    </div>

    <!-- The Logic -->
    <script>
        // Grab the slider and the top AI image layer from the HTML
        const slider = document.getElementById('opacitySlider');
        const ghostLayer = document.getElementById('ghostLayer');

        // Whenever the slider is moved, update the CSS opacity of the top image
        slider.addEventListener('input', function() {
            ghostLayer.style.opacity = this.value;
        });
    </script>

</body>
</html>
